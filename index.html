<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій план тренувань</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1D9E75" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Тренування">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="header">
        <div class="header-top">
            <div>
                <h1 class="header-title">Мій план</h1>
                <p class="header-sub">Персональний трекер</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="btn-settings" aria-label="Налаштування">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </button>
                <button class="icon-btn" id="theme-toggle" aria-label="Тема">
                    <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
                <button class="cal-btn" id="btn-cal">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                </button>
            </div>
        </div>
        <nav class="tabs" id="tabs-nav">
            <button class="tab active" data-tab="workout">Тренування</button>
            <button class="tab" data-tab="nutrition">Харчування</button>
            <button class="tab" data-tab="tips">Поради</button>
        </nav>
    </header>

    <main class="content">

        <section id="sec-workout" class="section active">
            <div class="stats" id="stats-bar">
                <div class="stat stat-editable" data-action="edit-stat" data-stat="current">
                    <div class="stat-val" id="stat-current">90 кг</div>
                    <div class="stat-lbl">Зараз ✎</div>
                </div>
                <div class="stat stat-editable" data-action="edit-stat" data-stat="target">
                    <div class="stat-val" id="stat-target">82 кг</div>
                    <div class="stat-lbl">Ціль ✎</div>
                </div>
                <div class="stat stat-editable" data-action="open-settings">
                    <div class="stat-val stat-goal"><span id="stat-goal-icon">🔥</span></div>
                    <div class="stat-lbl" id="stat-goal-label">Схуднення</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="stat-cal">2414</div>
                    <div class="stat-lbl">ккал/день</div>
                </div>
                <div class="stat" id="stat-done">
                    <div class="stat-val" id="stat-done-val">0</div>
                    <div class="stat-lbl">Виконано</div>
                    <div id="stat-streak"></div>
                </div>
            </div>

            <div class="apply-btn-wrap" id="apply-btn-wrap">
                <button class="apply-btn" id="btn-apply">✓ Застосувати план</button>
            </div>

            <div class="week-sched" id="week-sched"></div>
            <div id="workout-content"></div>
        </section>

        <section id="sec-nutrition" class="section">
            <div class="macro-bar" id="macro-bar"></div>
            <div class="week-nav">
                <span class="week-nav-label">Тиждень:</span>
                <button class="wk-btn active" id="btn-w1">1</button>
                <button class="wk-btn" id="btn-w2">2</button>
            </div>
            <div id="nutrition-content"></div>
        </section>

        <section id="sec-tips" class="section">
            <div id="tips-content"></div>
        </section>

    </main>

    <!-- SETTINGS MODAL -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2 class="modal-title">⚙️ Профіль</h2>
            <div class="settings-row">
                <div class="settings-field">
                    <label class="modal-label" for="set-height">Зріст (см)</label>
                    <input type="number" class="date-input" id="set-height" min="120" max="230">
                </div>
                <div class="settings-field">
                    <label class="modal-label" for="set-age">Вік</label>
                    <input type="number" class="date-input" id="set-age" min="14" max="90">
                </div>
            </div>

            <label class="modal-label">Стать</label>
            <div class="radio-group">
                <label class="radio-pill"><input type="radio" name="sex" value="male"><span>Чоловік</span></label>
                <label class="radio-pill"><input type="radio" name="sex" value="female"><span>Жінка</span></label>
            </div>

            <label class="modal-label">Рівень активності</label>
            <div class="radio-group radio-group-col">
                <label class="radio-pill"><input type="radio" name="activity" value="sedentary"><span>Сидячий (мало
                        руху)</span></label>
                <label class="radio-pill"><input type="radio" name="activity" value="moderate"><span>Помірний (2–4
                        трен/тиж)</span></label>
                <label class="radio-pill"><input type="radio" name="activity" value="active"><span>Активний (5+
                        трен/тиж)</span></label>
            </div>

            <label class="modal-label">Ціль</label>
            <div class="goal-cards" id="goal-cards"></div>

            <div class="settings-divider"></div>

            <div class="notify-header">
                <label class="modal-label" style="margin:0">🔔 Нагадування про тренування</label>
                <label class="switch">
                    <input type="checkbox" id="notify-toggle">
                    <span class="switch-slider"></span>
                </label>
            </div>
            <div class="notify-time-wrap" id="notify-time-wrap" style="display:none">
                <label class="modal-label" for="notify-time">Час тренування (нагадаю за 20 хв)</label>
                <input type="time" class="date-input" id="notify-time" value="18:00">
                <button class="test-notify-btn" id="btn-test-notify">Перевірити сповіщення</button>
            </div>
            <p class="notify-status" id="notify-status"></p>

            <div class="settings-divider"></div>

            <label class="modal-label">💾 Резервна копія даних</label>
            <div class="data-actions">
                <button class="btn-data" id="btn-export-json">⬇ Експорт JSON</button>
                <label class="btn-data" id="btn-import-label">
                    ⬆ Імпорт JSON
                    <input type="file" id="input-import-json" accept=".json" style="display:none">
                </label>
            </div>
            <p class="data-hint">Зберігає профіль, вагу і журнал тренувань</p>

            <div class="modal-actions">
                <button class="btn-secondary" id="btn-close-settings">Скасувати</button>
                <button class="btn-primary" id="btn-save-settings">Зберегти</button>
            </div>
        </div>
    </div>

    <!-- CALENDAR MODAL -->
    <div class="modal-overlay" id="cal-modal">
        <div class="modal">
            <h2 class="modal-title">Додати до календаря</h2>
            <p class="modal-sub">Вкажи дату першого понеділка — створю .ics з тренуваннями на 12 тижнів.</p>
            <label class="modal-label" for="start-date">Дата початку (понеділок)</label>
            <input type="date" class="date-input" id="start-date">
            <div class="modal-actions">
                <button class="btn-secondary" id="btn-close-cal">Скасувати</button>
                <button class="btn-primary" id="btn-generate-ics">Завантажити .ics</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- REST TIMER (фіксований блок внизу) -->
    <div class="rest-timer" id="rest-timer">
        <div class="rt-circle-wrap">
            <svg class="rt-svg" viewBox="0 0 60 60">
                <circle class="rt-track" cx="30" cy="30" r="26"></circle>
                <circle class="rt-progress" id="rt-progress" cx="30" cy="30" r="26"></circle>
            </svg>
            <span class="rt-time" id="rt-time">0:60</span>
        </div>
        <div class="rt-controls">
            <button class="rt-btn" data-action="timer-add" data-sec="-15" aria-label="−15 секунд">−15</button>
            <button class="rt-btn rt-btn-main" id="rt-playpause" data-action="timer-pause" aria-label="Пауза">⏸</button>
            <button class="rt-btn" data-action="timer-add" data-sec="15" aria-label="+15 секунд">+15</button>
            <button class="rt-btn" data-action="timer-reset" aria-label="Скинути">↻</button>
            <button class="rt-btn rt-btn-close" data-action="timer-close" aria-label="Закрити">✕</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
